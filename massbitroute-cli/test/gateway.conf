server {
        listen 80 default_server;
        listen [::]:80 default_server;

        root /var/www/html;

        index index.html index.htm index.nginx-debian.html;

        server_name _;
        location /config/nodes {
            default_type  text/plain;
            return 200 'ok bro';
        }
        location /config/dapps {               
            default_type  text/plain;
            return 200 'ok bro';  
        }
        location /config/new-secret-key {
            default_type  text/plain;
            return 200 'ok bro';
        }
}
