server {
        listen 80 default_server;
        listen [::]:80 default_server;

        root /var/www/html;

        index index.html index.htm index.nginx-debian.html;

        server_name _;
        location /mbr/config/nodes {
            default_type  text/plain;
            return 200 'ok bro';
        }
        location /mbr/config/dapps/create {
            default_type  text/plain;
            return 200 'ok bro';
        }
        location /mbr/config/dapps/update {
            default_type  text/plain;
            return 200 'ok bro';
        }
        location /mbr/config/dapps/delete {
            default_type  text/plain;
            return 200 'ok bro';
        }
        location /mbr/config/dapps/delete-all {
            default_type  text/plain;
            return 200 'ok bro';
        }
        location /mbr/config/new-secret-key {
            default_type  text/plain;
            return 200 'ok bro';
        }
}
